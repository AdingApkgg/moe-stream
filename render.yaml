# ============================================================
# Render Blueprint — 一键部署多服务
# ============================================================
#
# 使用方式:
#   1. Fork 本仓库
#   2. 在 Render Dashboard 点击 "New Blueprint Instance"
#   3. 选择仓库并部署
#   4. 配置环境变量
#
# 文档: https://docs.render.com/infrastructure-as-code
# ============================================================

services:
  # ---------- Next.js 应用 ----------
  - type: web
    name: moestream-app
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: starter
    healthCheckPath: /robots.txt
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: moestream-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: moestream-redis
          type: redis
          property: connectionString
      - key: BETTER_AUTH_SECRET
        generateValue: true
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: NEXT_PUBLIC_SOCKET_URL
        sync: false
      - key: NODE_ENV
        value: production

  # ---------- Socket.io 服务 ----------
  - type: web
    name: moestream-socket
    runtime: docker
    dockerfilePath: ./Dockerfile.socket
    dockerContext: .
    plan: starter
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: moestream-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: moestream-redis
          type: redis
          property: connectionString
      - key: SOCKET_PORT
        value: "3001"
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_APP_URL
        sync: false

databases:
  - name: moestream-db
    plan: starter
    databaseName: moestream
    postgresMajorVersion: "16"

# Render 原生 Redis
# 注: Render Redis 需要付费 plan
# 如需免费方案可使用 Upstash Redis 并手动配置 REDIS_URL
