# ============================================================
# Railway 部署配置
# ============================================================
#
# Railway 支持从同一仓库部署多个服务。
# 在 Railway Dashboard 中创建以下服务：
#
# 1. App 服务 — 使用此 railway.toml（默认）
# 2. Socket 服务 — 创建新服务，设置环境变量 RAILWAY_DOCKERFILE_PATH=Dockerfile.socket
#      Railway 不支持 Docker build target，需使用独立 Dockerfile
# 3. PostgreSQL — 使用 Railway 内置模板
# 4. Redis — 使用 Railway 内置模板
#
# 环境变量（在 Dashboard 中配置）:
#   DATABASE_URL        — Railway Postgres 自动注入，或手动设置
#   REDIS_URL           — Railway Redis 自动注入，或手动设置
#   BETTER_AUTH_SECRET   — 认证密钥（至少 32 字符）
#   NEXT_PUBLIC_APP_URL  — 你的域名，如 https://example.com
#   NEXT_PUBLIC_SOCKET_URL — Socket 服务 URL，如 https://socket.example.com
#   PORT                — Railway 自动设置
#
# ============================================================

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/robots.txt"
healthcheckTimeout = 120
numReplicas = 1
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
