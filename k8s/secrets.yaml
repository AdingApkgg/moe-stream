# ============================================================
# Secrets — 部署前用实际值替换占位符
# ============================================================
#
# 推荐使用 kubectl create secret 而非直接提交此文件:
#   kubectl create secret generic moestream-secrets \
#     --namespace=moestream \
#     --from-literal=DATABASE_URL='postgresql://user:pass@host:5432/db' \
#     --from-literal=REDIS_URL='redis://host:6379' \
#     --from-literal=BETTER_AUTH_SECRET='your-secret-key'
#
# ============================================================

apiVersion: v1
kind: Secret
metadata:
  name: moestream-secrets
  namespace: moestream
  labels:
    app.kubernetes.io/name: moestream
type: Opaque
stringData:
  DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/moestream?schema=public"
  REDIS_URL: "redis://redis:6379"
  BETTER_AUTH_SECRET: "CHANGE_ME_TO_A_SECURE_RANDOM_STRING"
