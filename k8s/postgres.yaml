# ============================================================
# PostgreSQL — 仅供开发/测试使用
# 生产环境推荐使用托管数据库（RDS / Cloud SQL / Neon 等）
# ============================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: moestream
  labels:
    app.kubernetes.io/name: moestream
    app.kubernetes.io/component: postgres
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: moestream
      app.kubernetes.io/component: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: moestream
        app.kubernetes.io/component: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              value: postgres
            - name: POSTGRES_DB
              value: moestream
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: moestream-postgres
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: moestream
  labels:
    app.kubernetes.io/name: moestream
    app.kubernetes.io/component: postgres
spec:
  selector:
    app.kubernetes.io/name: moestream
    app.kubernetes.io/component: postgres
  ports:
    - port: 5432
      targetPort: 5432
