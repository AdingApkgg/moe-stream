# ============================================================
# Ingress — 根据集群 Ingress Controller 调整 annotations
# 以下示例使用 nginx ingress controller
# ============================================================

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: moestream
  namespace: moestream
  labels:
    app.kubernetes.io/name: moestream
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    # WebSocket 支持
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/upstream-hash-by: "$remote_addr"
    # TLS — 取消注释并替换为你的证书 Secret
    # cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  # tls:
  #   - hosts:
  #       - example.com
  #       - socket.example.com
  #     secretName: moestream-tls
  rules:
    - host: example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: moestream-app
                port:
                  number: 3000
    - host: socket.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: moestream-socket
                port:
                  number: 3001
