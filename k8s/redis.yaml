# ============================================================
# Redis — 仅供开发/测试使用
# 生产环境推荐使用托管 Redis（ElastiCache / Upstash / Aiven 等）
# ============================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: moestream
  labels:
    app.kubernetes.io/name: moestream
    app.kubernetes.io/component: redis
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: moestream
      app.kubernetes.io/component: redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: moestream
        app.kubernetes.io/component: redis
    spec:
      containers:
        - name: redis
          image: redis:8-alpine
          command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          volumeMounts:
            - name: redis-data
              mountPath: /data
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: moestream-redis
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: moestream
  labels:
    app.kubernetes.io/name: moestream
    app.kubernetes.io/component: redis
spec:
  selector:
    app.kubernetes.io/name: moestream
    app.kubernetes.io/component: redis
  ports:
    - port: 6379
      targetPort: 6379
